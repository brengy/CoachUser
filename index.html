<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Workout Planner</title>
<!-- Simple Dumbbell Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='35' width='80' height='30' rx='5' fill='%23333'/><rect x='0' y='25' width='20' height='50' rx='5' fill='%23555'/><rect x='80' y='25' width='20' height='50' rx='5' fill='%23555'/></svg>">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, "Segoe UI", sans-serif;
    background: #f4f6f8;
    color: #1f2937;
    margin: 0;
    padding: 0;
  }

  header {
    background: linear-gradient(135deg, #111827, #1f2937);
    color: white;
    padding: 28px 18px;
    text-align: center;
  }

  header h1 {
    margin: 0 0 8px;
    font-size: clamp(24px, 5vw, 38px);
  }

  header p {
    margin: 0;
    color: #d1d5db;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ===== LOGIN SECTION ===== */
  .login-section {
    background: white;
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    margin: 40px auto;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .login-section h2 {
    margin-top: 0;
    color: #111827;
    font-size: 28px;
  }

  .login-section .emoji {
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
  }

  .login-section p {
    color: #6b7280;
    margin-bottom: 20px;
  }

  .login-section input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-size: 16px;
    margin-bottom: 16px;
    transition: 0.3s;
  }

  .login-section input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .login-section .btn-login {
    padding: 14px 40px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    width: 100%;
  }

  .login-section .btn-login:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
  }

  .login-section .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .login-section .message {
    padding: 12px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  .login-section .message.success {
    display: block;
    background: #d1fae5;
    color: #065f46;
  }

  .login-section .message.error {
    display: block;
    background: #fee2e2;
    color: #991b1b;
  }

  .login-section .message.info {
    display: block;
    background: #dbeafe;
    color: #1e40af;
  }

  /* ===== API SETUP ===== */
  .api-setup {
    background: #f8fafc;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: none;
  }

  .api-setup.visible {
    display: block;
  }

  .api-setup label {
    display: block;
    font-weight: 600;
    font-size: 13px;
    color: #374151;
    margin-bottom: 4px;
  }

  .api-setup input {
    width: 100%;
    padding: 10px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
  }

  .api-setup .btn-setup {
    margin-top: 8px;
    padding: 8px 16px;
    background: #6b7280;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }

  .api-setup .btn-setup:hover {
    background: #4b5563;
  }

  /* ===== WEEK TABS ===== */
  .week-container {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    border: 1px solid #e5e7eb;
    display: none;
  }

  .week-container.visible {
    display: block;
  }

  .week-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .week-header .user-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .week-header .user-info .username-badge {
    background: #dbeafe;
    color: #1e40af;
    padding: 4px 16px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
  }

  .week-header .logout-btn {
    background: #dc2626;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: 0.2s;
  }

  .week-header .logout-btn:hover {
    background: #b91c1c;
  }

  .week-header h2 {
    margin: 0;
    font-size: 20px;
    color: #111827;
  }

  .week-nav {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .day-tab {
    padding: 10px 18px;
    border: 2px solid #e5e7eb;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.2s;
    color: #1f2937;
    min-width: 60px;
    text-align: center;
  }

  .day-tab:hover:not(.rest):not(.active) {
    background: #f3f4f6;
    border-color: #9ca3af;
  }

  .day-tab.active {
    background: #1e40af;
    color: white;
    border-color: #1e40af;
    transform: scale(1.05);
  }

  .day-tab.rest {
    opacity: 0.5;
    cursor: default;
    background: #f3f4f6;
    border-color: #e5e7eb;
  }

  .day-tab .day-label {
    display: block;
    font-size: 10px;
    font-weight: normal;
    opacity: 0.7;
  }

  .day-tab.active .day-label {
    opacity: 0.9;
  }

  .day-tab .day-icon {
    display: block;
    font-size: 18px;
    margin-top: 2px;
  }

  /* ===== WORKOUT CONTENT ===== */
  .workout-content {
    display: none;
    animation: fadeIn 0.4s ease;
  }

  .workout-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .workout-header {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: white;
    padding: 16px 20px;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .workout-header h2 {
    margin: 0;
    font-size: 20px;
  }

  .workout-header .day-badge {
    background: rgba(255,255,255,0.15);
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 14px;
  }

  .workout-header .major-badge {
    background: rgba(37, 99, 235, 0.3);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    margin-top: 4px;
    display: inline-block;
  }

  .exercise-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    padding: 16px;
    background: #e5e7eb;
    border-radius: 0 0 12px 12px;
  }

  .exercise-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: 0.2s;
  }

  .exercise-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  .exercise-image {
    width: 100%;
    height: 160px;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .exercise-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .exercise-image .placeholder {
    color: #6b7280;
    font-size: 14px;
    text-align: center;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  .exercise-image .placeholder .icon {
    font-size: 36px;
    display: block;
    margin-bottom: 8px;
  }

  .exercise-header {
    padding: 14px 18px 8px;
    border-bottom: 1px solid #f3f4f6;
  }

  .exercise-header h3 {
    margin: 0 0 4px;
    font-size: 18px;
  }

  .arabic {
    direction: rtl;
    text-align: right;
    font-size: 15px;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .muscle {
    display: inline-block;
    background: #eff6ff;
    color: #1d4ed8;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: bold;
  }

  .details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 12px 18px;
  }

  .detail {
    background: #f9fafb;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }

  .detail-label {
    display: block;
    font-size: 10px;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .detail-value {
    font-weight: bold;
    font-size: 14px;
  }

  .inputs {
    padding: 0 18px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 4px;
  }

  .input-group input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 13px;
    transition: 0.2s;
  }

  .input-group input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  /* ===== SAVE BAR ===== */
  .save-bar {
    position: sticky;
    bottom: 0;
    background: rgba(255,255,255,.96);
    border-top: 1px solid #e5e7eb;
    padding: 14px;
    text-align: center;
    backdrop-filter: blur(8px);
    display: none;
  }

  .save-bar.visible {
    display: block;
  }

  .save-btn {
    border: 0;
    background: #15803d;
    color: white;
    padding: 12px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  .save-btn:hover {
    background: #166534;
    transform: scale(1.02);
  }

  .save-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .save-message {
    margin-left: 12px;
    font-weight: 600;
    font-size: 14px;
  }

  .save-message.success {
    color: #15803d;
  }

  .save-message.error {
    color: #dc2626;
  }

  /* ===== EMPTY STATES ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #6b7280;
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .empty-state h3 {
    color: #374151;
    margin-bottom: 8px;
  }

  .no-exercises {
    text-align: center;
    padding: 40px;
    color: #6b7280;
    background: white;
    border-radius: 12px;
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: #6b7280;
  }

  .loading .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid #e5e7eb;
    border-top: 4px solid #2563eb;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .container { padding: 12px; }
    .exercise-grid { padding: 10px; }
    .exercise-image { height: 140px; }
    .week-nav { gap: 4px; }
    .day-tab { padding: 8px 12px; font-size: 12px; min-width: 50px; }
    .login-section { padding: 24px; margin: 20px; }
    .details { grid-template-columns: 1fr 1fr 1fr; }
    .inputs { grid-template-columns: 1fr 1fr; }
    .workout-header h2 { font-size: 17px; }
  }

  @media (max-width: 400px) {
    .exercise-grid { grid-template-columns: 1fr; }
    .day-tab { padding: 6px 10px; font-size: 11px; min-width: 44px; }
    .inputs { grid-template-columns: 1fr; }
  }
</style>
</head>

<body>

<header>
  <h1>🏋️ My Workout Planner</h1>
  <p>Your personalized workout plan</p>
</header>

<main class="container">

  <!-- ===== LOGIN SECTION ===== -->
  <div id="loginSection" class="login-section">
    <span class="emoji">👋</span>
    <h2>Welcome!</h2>
    <p>Enter your username to view your workout plan</p>
    
    <div class="api-setup" id="apiSetup">
      <label>Google Apps Script URL</label>
      <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/....../exec">
      <button class="btn-setup" onclick="saveApiUrl()">💾 Save URL</button>
    </div>

    <input type="text" id="usernameInput" placeholder="Enter your username" onkeypress="if(event.key==='Enter') login()">
    <button class="btn-login" id="loginBtn" onclick="login()">📥 Load My Workout</button>
    <div id="loginMessage" class="message"></div>
    <div style="margin-top:12px; font-size:13px; color:#6b7280;">
      <a href="#" onclick="document.getElementById('apiSetup').classList.toggle('visible'); return false;">⚙️ Configure API URL</a>
    </div>
  </div>

  <!-- ===== WEEK TABS ===== -->
  <div id="weekContainer" class="week-container">
    <div class="week-header">
      <div class="user-info">
        <span class="username-badge" id="userDisplay">👤 username</span>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
      </div>
      <div style="flex:1; min-width:100%;">
        <h2 id="weekTitle">Week 1</h2>
        <div class="week-nav" id="dayTabs"></div>
      </div>
    </div>
    <div id="workoutContent">
      <div class="loading">
        <div class="spinner"></div>
        <p style="margin-top:16px;">Loading your workout...</p>
      </div>
    </div>
  </div>

</main>

<!-- ===== SAVE BAR ===== -->
<div class="save-bar" id="saveBar">
  <button class="save-btn" id="saveBtn" onclick="saveProgress()">💾 Save My Progress</button>
  <span class="save-message" id="saveMessage"></span>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const STORAGE_KEY_API = 'user_api_url';
const STORAGE_KEY_USER = 'workout_username';
let currentWorkoutData = [];
let currentPipeline = [];
let activeDayIndex = 0;
let currentUsername = '';
let apiUrl = '';

// Load saved data
const savedApiUrl = localStorage.getItem(STORAGE_KEY_API);
const savedUsername = localStorage.getItem(STORAGE_KEY_USER);

if (savedApiUrl) {
  apiUrl = savedApiUrl;
  document.getElementById('apiUrl').value = savedApiUrl;
}

if (savedUsername) {
  document.getElementById('usernameInput').value = savedUsername;
  currentUsername = savedUsername;
  // Auto-login after page load
  window.addEventListener('load', function() {
    if (savedApiUrl && savedUsername) {
      setTimeout(login, 500);
    }
  });
}

// ============================================================
// IMAGE DATABASE
// ============================================================
const exerciseImages = {
  'Incline Barbell Chest Press': 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=300&fit=crop',
  'Lat Pulldown': 'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=400&h=300&fit=crop',
  'Flat Dumbbell Chest Press': 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&h=300&fit=crop',
  'Hammer Row (Wide Grip)': 'https://images.unsplash.com/photo-1581009146145-b5b2b1a8b1a8?w=400&h=300&fit=crop',
  'Y Raises': 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=300&fit=crop',
  'No Cheat Dumbbell Curl': 'https://images.unsplash.com/photo-1581009146145-b5b2b1a8b1a8?w=400&h=300&fit=crop',
  'Cable Push Down': 'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=400&h=300&fit=crop',
  'Wrist Curl': 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&h=300&fit=crop',
  'Hack Squats': 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&h=300&fit=crop',
  'Romanian Deadlift (RDL)': 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=300&fit=crop',
  'Leg Extension': 'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=400&h=300&fit=crop',
  'Lying Leg Curl': 'https://images.unsplash.com/photo-1581009146145-b5b2b1a8b1a8?w=400&h=300&fit=crop',
  'Machine Shoulder Press': 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=300&fit=crop',
  'Hammer Row (Close Grip)': 'https://images.unsplash.com/photo-1581009146145-b5b2b1a8b1a8?w=400&h=300&fit=crop',
  'Fly Machine (Pec Deck)': 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&h=300&fit=crop',
  'Cable Shrugs': 'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=400&h=300&fit=crop',
  'Rear Delt Flies': 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=300&fit=crop',
  'Hammer Curl': 'https://images.unsplash.com/photo-1581009146145-b5b2b1a8b1a8?w=400&h=300&fit=crop',
  'Overhead Cable/DB Extension': 'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=400&h=300&fit=crop'
};

const fallbackImages = [
  'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&h=300&fit=crop',
  'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&h=300&fit=crop',
  'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=400&h=300&fit=crop',
  'https://images.unsplash.com/photo-1581009146145-b5b2b1a8b1a8?w=400&h=300&fit=crop'
];

function getExerciseImage(exerciseName) {
  if (exerciseImages[exerciseName]) return exerciseImages[exerciseName];
  const lowerName = exerciseName.toLowerCase();
  for (const [key, url] of Object.entries(exerciseImages)) {
    if (lowerName.includes(key.toLowerCase()) || key.toLowerCase().includes(lowerName)) {
      return url;
    }
  }
  return fallbackImages[Math.floor(Math.random() * fallbackImages.length)];
}

// ============================================================
// SAVE API URL
// ============================================================
function saveApiUrl() {
  const url = document.getElementById('apiUrl').value.trim();
  if (url) {
    apiUrl = url;
    localStorage.setItem(STORAGE_KEY_API, url);
    showLoginMessage('✅ API URL saved!', 'success');
  }
}

// ============================================================
// API CALL
// ============================================================
async function callApi(action, data = {}) {
  if (!apiUrl) {
    showLoginMessage('Please configure your API URL first (click the link below)', 'error');
    return null;
  }

  try {
    const params = new URLSearchParams();
    params.append('action', action);
    Object.keys(data).forEach(key => {
      if (data[key] !== undefined && data[key] !== null && data[key] !== '') {
        params.append(key, data[key]);
      }
    });

    const url = apiUrl + '?' + params.toString();
    console.log('API Request:', url);

    const response = await fetch(url, { method: 'GET' });
    if (!response.ok) {
      throw new Error('HTTP Error ' + response.status);
    }

    const result = await response.json();
    console.log('API Response:', result);
    return result;

  } catch (error) {
    console.error('API Error:', error);
    showLoginMessage('❌ Error: ' + error.message, 'error');
    return null;
  }
}

// ============================================================
// LOGIN
// ============================================================
async function login() {
  const username = document.getElementById('usernameInput').value.trim();
  if (!username) {
    showLoginMessage('Please enter your username', 'error');
    return;
  }

  // Check if API URL is set
  if (!apiUrl) {
    showLoginMessage('Please configure your API URL first (click the link below)', 'error');
    document.getElementById('apiSetup').classList.add('visible');
    return;
  }

  currentUsername = username;
  localStorage.setItem(STORAGE_KEY_USER, username);

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Loading...';

  showLoginMessage('Loading your workout plan...', 'info');

  const result = await callApi('getWorkoutData', { username });

  btn.disabled = false;
  btn.textContent = '📥 Load My Workout';

  if (result && result.status === 'success') {
    if (!result.sections || result.sections.length === 0) {
      showLoginMessage('No workout data found for this user. Please contact your coach.', 'error');
      return;
    }

    currentWorkoutData = result.sections;
    currentPipeline = result.pipeline;
    activeDayIndex = 0;

    // Show workout UI
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('weekContainer').classList.add('visible');
    document.getElementById('saveBar').classList.add('visible');
    document.getElementById('userDisplay').textContent = '👤 ' + username;

    renderWeekTabs();
    showLoginMessage('✅ Welcome ' + username + '!', 'success');
  } else {
    showLoginMessage('Error loading data: ' + (result?.message || 'Unknown error'), 'error');
  }
}

// ============================================================
// LOGOUT
// ============================================================
function logout() {
  currentUsername = '';
  currentWorkoutData = [];
  currentPipeline = [];
  activeDayIndex = 0;

  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('weekContainer').classList.remove('visible');
  document.getElementById('saveBar').classList.remove('visible');
  document.getElementById('usernameInput').value = '';
  document.getElementById('usernameInput').focus();

  showLoginMessage('Logged out successfully', 'success');
}

// ============================================================
// RENDER DAY CONTENT
// ============================================================
function renderDayContent(dayIndex) {
  const contentContainer = document.getElementById('workoutContent');

  if (!currentWorkoutData || currentWorkoutData.length === 0 || dayIndex >= currentWorkoutData.length) {
    contentContainer.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <h3>No Exercises for This Day</h3>
        <p>Your coach hasn't added exercises for this day yet</p>
      </div>
    `;
    return;
  }

  const section = currentWorkoutData[dayIndex];
  if (!section || !section.exercises || section.exercises.length === 0) {
    contentContainer.innerHTML = `
      <div class="no-exercises">
        <p>😴 Rest Day - No exercises scheduled</p>
      </div>
    `;
    return;
  }

  // Get major from first exercise
  const major = section.exercises[0]?.major || 'Workout';

  let html = `
    <div class="workout-content active">
      <div class="workout-header">
        <div>
          <h2>${section.title || 'Workout'}</h2>
          <span class="major-badge">🏷️ ${major}</span>
        </div>
        <span class="day-badge">📅 ${section.title}</span>
      </div>
      <div class="exercise-grid">
  `;

  section.exercises.forEach((exercise, exerciseIndex) => {
    const id = `${dayIndex}-${exerciseIndex}`;
    const imageUrl = getExerciseImage(exercise.eng);
    const savedWeight = localStorage.getItem(`weight-${id}`) || '';
    const savedAchieved = localStorage.getItem(`achieved-${id}`) || '';

    html += `
      <div class="exercise-card">
        <div class="exercise-image">
          <img src="${imageUrl}" alt="${exercise.eng}" loading="lazy" 
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
          <div class="placeholder" style="display:none;">
            <span class="icon">💪</span>
            <span>${exercise.eng}</span>
          </div>
        </div>

        <div class="exercise-header">
          <h3>${exercise.eng || 'Exercise'}</h3>
          <div class="arabic">${exercise.arb || ''}</div>
          <span class="muscle">${exercise.muscle || '—'}</span>
        </div>

        <div class="details">
          <div class="detail">
            <span class="detail-label">Sets</span>
            <span class="detail-value">${exercise.sets || '—'}</span>
          </div>
          <div class="detail">
            <span class="detail-label">Reps</span>
            <span class="detail-value">${exercise.reps || '—'}</span>
          </div>
          <div class="detail">
            <span class="detail-label">Rest</span>
            <span class="detail-value">${exercise.rest || '—'}</span>
          </div>
        </div>

        <div class="inputs">
          <div class="input-group">
            <label for="weight-${id}">🏋️ Weight</label>
            <input id="weight-${id}" type="text" placeholder="e.g. 20 kg" value="${savedWeight}">
          </div>
          <div class="input-group">
            <label for="achieved-${id}">✅ Reps Achieved</label>
            <input id="achieved-${id}" type="text" placeholder="e.g. 8, 8, 7" value="${savedAchieved}">
          </div>
        </div>
      </div>
    `;
  });

  html += `</div></div>`;
  contentContainer.innerHTML = html;
}

// ============================================================
// RENDER WEEK TABS
// ============================================================
function renderWeekTabs() {
  const tabsContainer = document.getElementById('dayTabs');

  if (!currentPipeline || currentPipeline.length === 0 || !currentWorkoutData || currentWorkoutData.length === 0) {
    return;
  }

  const week = currentPipeline[0];
  document.getElementById('weekTitle').textContent = week.weekLabel || 'Week 1';

  let tabsHtml = '';
  week.days.forEach((day, index) => {
    const isRest = day.type === 'rest';
    const isActive = index === activeDayIndex;
    const dayNum = index + 1;
    const hasWorkout = currentWorkoutData[index] && currentWorkoutData[index].exercises && currentWorkoutData[index].exercises.length > 0;

    const icon = isRest ? '😴' : (hasWorkout ? '💪' : '📋');

    tabsHtml += `
      <button class="day-tab ${isActive ? 'active' : ''} ${isRest ? 'rest' : ''}" 
              onclick="switchDay(${index})" 
              ${isRest ? 'disabled' : ''}>
        <span class="day-label">Day ${dayNum}</span>
        <span class="day-icon">${icon}</span>
      </button>
    `;
  });

  tabsContainer.innerHTML = tabsHtml;
  renderDayContent(activeDayIndex);
}

// ============================================================
// SWITCH DAY
// ============================================================
function switchDay(index) {
  if (index >= currentWorkoutData.length) return;

  if (currentPipeline && currentPipeline.length > 0) {
    const week = currentPipeline[0];
    if (week.days[index] && week.days[index].type === 'rest') {
      return;
    }
  }

  activeDayIndex = index;

  const tabs = document.querySelectorAll('.day-tab');
  tabs.forEach((tab, i) => {
    tab.classList.toggle('active', i === index);
  });

  renderDayContent(index);
}

// ============================================================
// SAVE PROGRESS
// ============================================================
function saveProgress() {
  if (!currentWorkoutData || currentWorkoutData.length === 0) {
    showSaveMessage('⚠️ No workout data to save', 'error');
    return;
  }

  let savedCount = 0;
  let totalWithData = 0;

  currentWorkoutData.forEach((section, sectionIndex) => {
    if (!section.exercises) return;
    section.exercises.forEach((exercise, exerciseIndex) => {
      const id = `${sectionIndex}-${exerciseIndex}`;
      const weight = document.getElementById(`weight-${id}`)?.value || '';
      const achieved = document.getElementById(`achieved-${id}`)?.value || '';

      if (weight || achieved) {
        totalWithData++;
        localStorage.setItem(`weight-${id}`, weight);
        localStorage.setItem(`achieved-${id}`, achieved);
        savedCount++;
      }
    });
  });

  if (savedCount > 0) {
    showSaveMessage(`✅ Saved ${savedCount} entries!`, 'success');
  } else {
    showSaveMessage('ℹ️ No data to save. Enter some weights or reps first.', 'error');
  }
}

// ============================================================
// SHOW MESSAGES
// ============================================================
function showLoginMessage(text, type) {
  const el = document.getElementById('loginMessage');
  el.textContent = text;
  el.className = 'message ' + type;
  el.style.display = 'block';

  if (type === 'success' || type === 'info') {
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }
}

function showSaveMessage(text, type) {
  const el = document.getElementById('saveMessage');
  el.textContent = text;
  el.className = 'save-message ' + type;
  el.style.display = 'inline';

  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', function(e) {
  // Ctrl+S to save
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    saveProgress();
  }
});
</script>
